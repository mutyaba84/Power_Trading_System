services:
  backend:
    build:
      context: .             # Project root includes backend + external_memory
      dockerfile: Dockerfile.backend
    container_name: ai_trading_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend        # hot reload backend code
      - ./external_memory:/app/external_memory  # keep logs, ai_state
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai_trading_frontend
    ports:
      - "3000:80"                     # maps Nginx port 80 to localhost:3000
    restart: unless-stopped
