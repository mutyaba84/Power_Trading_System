services:
  backend:
    build:
      context: .                # ✅ ROOT CONTEXT (CRITICAL)
      dockerfile: Dockerfile.backend
    container_name: ai_trading_backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ./external_memory:/app/external_memory
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: ai_trading_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
